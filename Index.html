
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collage 10x15</title>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { margin: 0; background: #050505; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

const { useState, useRef } = React;

const CANVAS_WIDTH = 1200;
const CANVAS_HEIGHT = 1800;

function App() {
  const [photos, setPhotos] = useState([null, null, null, null]);
  const [transforms, setTransforms] = useState(
    Array(4).fill(0).map(() => ({ x: 0, y: 0, scale: 1, baseScale: 1 }))
  );
  const [selectedIndex, setSelectedIndex] = useState(0);
  const [isExporting, setIsExporting] = useState(false);

  const fileInputRef = useRef(null);
  const containerRefs = [useRef(), useRef(), useRef(), useRef()];

  const calculateInitialScale = (imgW, imgH, containerW, containerH) => {
    const scaleX = containerW / imgW;
    const scaleY = containerH / imgH;
    return Math.max(scaleX, scaleY);
  };

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const img = new Image();
      img.onload = () => {
        const newPhotos = [...photos];
        newPhotos[selectedIndex] = { src: event.target.result, width: img.width, height: img.height };
        setPhotos(newPhotos);

        const containerW = containerRefs[selectedIndex].current.offsetWidth;
        const containerH = containerRefs[selectedIndex].current.offsetHeight;
        const initialScale = calculateInitialScale(img.width, img.height, containerW, containerH);

        setTransforms(prev => {
          const next = [...prev];
          next[selectedIndex] = { x: 0, y: 0, scale: initialScale, baseScale: initialScale };
          return next;
        });
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = null;
  };

  const handleDrag = (index, e) => {
    setSelectedIndex(index);
    if (!photos[index]) return;

    const startX = e.clientX;
    const startY = e.clientY;
    const initialPos = { x: transforms[index].x, y: transforms[index].y };

    const onMove = (moveEvent) => {
      const currentX = moveEvent.clientX;
      const currentY = moveEvent.clientY;

      setTransforms(prev => {
        const next = [...prev];
        next[index] = {
          ...next[index],
          x: initialPos.x + (currentX - startX),
          y: initialPos.y + (currentY - startY)
        };
        return next;
      });
    };

    const onEnd = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onEnd);
    };

    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
  };

  const exportCollage = async () => {
    if (isExporting) return;
    setIsExporting(true);

    const canvas = document.createElement('canvas');
    canvas.width = CANVAS_WIDTH;
    canvas.height = CANVAS_HEIGHT;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < photos.length; i++) {
      const photo = photos[i];
      if (!photo) continue;

      await new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const col = i % 2;
          const row = Math.floor(i / 2);
          const cellW = CANVAS_WIDTH / 2;
          const cellH = CANVAS_HEIGHT / 2;
          const targetX = col * cellW;
          const targetY = row * cellH;

          ctx.save();
          ctx.beginPath();
          ctx.rect(targetX, targetY, cellW, cellH);
          ctx.clip();

          const t = transforms[i];
          const uiToCanvasRatio = cellW / containerRefs[i].current.offsetWidth;
          const drawW = photo.width * t.scale * uiToCanvasRatio;
          const drawH = photo.height * t.scale * uiToCanvasRatio;
          const centerX = targetX + cellW / 2 + (t.x * uiToCanvasRatio);
          const centerY = targetY + cellH / 2 + (t.y * uiToCanvasRatio);

          ctx.drawImage(img, centerX - drawW / 2, centerY - drawH / 2, drawW, drawH);
          ctx.restore();
          resolve();
        };
        img.src = photo.src;
      });
    }

    const url = canvas.toDataURL("image/png");
    const link = document.createElement("a");
    link.href = url;
    link.download = "collage_10x15.png";
    link.click();

    setIsExporting(false);
  };

  return (
    <div className="h-screen flex flex-col text-slate-300 font-sans">
      <header className="px-4 py-3 border-b border-emerald-500/20 flex justify-between items-center bg-[#0a0a0a]">
        <h1 className="text-base font-black text-emerald-500 uppercase">Collage 10x15</h1>
        <button
          onClick={exportCollage}
          disabled={isExporting || !photos.some(p => p)}
          className="px-4 py-2 bg-emerald-500 text-black rounded text-xs font-bold"
        >
          {isExporting ? "Generando..." : "Descargar PNG"}
        </button>
      </header>

      <main className="flex-1 flex items-center justify-center p-4">
        <div
          className="relative bg-black overflow-hidden grid"
          style={{
            height: '80vh',
            aspectRatio: '2/3',
            gridTemplateColumns: '1fr 1fr',
            gridTemplateRows: '1fr 1fr'
          }}
        >
          {photos.map((photo, i) => (
            <div
              key={i}
              ref={containerRefs[i]}
              onMouseDown={(e) => handleDrag(i, e)}
              onClick={() => setSelectedIndex(i)}
              className={`relative overflow-hidden cursor-move ${selectedIndex === i ? 'ring-2 ring-emerald-500' : 'opacity-70'}`}
            >
              {!photo ? (
                <div className="absolute inset-0 flex items-center justify-center text-emerald-500 text-xs">
                  Vacío
                </div>
              ) : (
                <img
                  src={photo.src}
                  draggable="false"
                  className="absolute pointer-events-none max-w-none"
                  style={{
                    transform: `translate(calc(-50% + ${transforms[i].x}px), calc(-50% + ${transforms[i].y}px)) scale(${transforms[i].scale})`,
                    top: '50%',
                    left: '50%'
                  }}
                />
              )}
            </div>
          ))}
        </div>
      </main>

      <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileChange} />

      <div className="p-4 bg-[#0a0a0a]">
        <button
          onClick={() => fileInputRef.current.click()}
          className="w-full py-2 bg-emerald-500 text-black rounded text-xs font-bold"
        >
          Cargar Imagen en Slot {selectedIndex + 1}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
