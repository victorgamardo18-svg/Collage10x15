<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Collage 10x15</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; margin: 0; touch-action: manipulation; }
        .emerald-glow { text-shadow: 0 0 12px rgba(16, 185, 129, 0.6); }
        .emerald-shadow { box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px;
            border-radius: 50%; background: #10b981; cursor: pointer;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.8); margin-top: -8px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: rgba(16, 185, 129, 0.2); border-radius: 2px;
        }
        .canvas-container { touch-action: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // Versión optimizada sin Babel para máxima compatibilidad en GitHub Pages
        const { useState, useRef, useEffect, createElement: h } = React;

        const App = () => {
            const [photos, setPhotos] = useState([null, null, null, null]);
            const [transforms, setTransforms] = useState(
                Array(4).fill(0).map(() => ({ x: 0, y: 0, scale: 1, baseScale: 1 }))
            );
            const [selectedIndex, setSelectedIndex] = useState(0);
            const [isExporting, setIsExporting] = useState(false);

            const fileInputRef = useRef(null);
            const containerRefs = [useRef(), useRef(), useRef(), useRef()];

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const newPhotos = [...photos];
                        newPhotos[selectedIndex] = { src: event.target.result, width: img.width, height: img.height };
                        setPhotos(newPhotos);
                        
                        const containerW = containerRefs[selectedIndex].current.offsetWidth;
                        const containerH = containerRefs[selectedIndex].current.offsetHeight;
                        const scale = Math.max(containerW / img.width, containerH / img.height);
                        
                        setTransforms(prev => {
                            const next = [...prev];
                            next[selectedIndex] = { x: 0, y: 0, scale: scale, baseScale: scale };
                            return next;
                        });
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = null;
            };

            const handleDrag = (index, e) => {
                setSelectedIndex(index);
                if (!photos[index]) return;
                
                const isTouch = e.type.includes('touch');
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const initialPos = { x: transforms[index].x, y: transforms[index].y };

                const onMove = (mE) => {
                    const cX = isTouch ? mE.touches[0].clientX : mE.clientX;
                    const cY = isTouch ? mE.touches[0].clientY : mE.clientY;
                    setTransforms(prev => {
                        const next = [...prev];
                        next[index] = { ...next[index], x: initialPos.x + (cX - startX), y: initialPos.y + (cY - startY) };
                        return next;
                    });
                };

                const onEnd = () => {
                    window.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
                    window.removeEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
                };

                window.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
                window.addEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
            };

            const exportCollage = () => {
                setIsExporting(true);
                const canvas = document.createElement('canvas');
                canvas.width = 1200; canvas.height = 1800;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 1200, 1800);

                const draws = photos.map((photo, i) => {
                    if (!photo) return Promise.resolve();
                    return new Promise(res => {
                        const img = new Image();
                        img.onload = () => {
                            const col = i % 2, row = Math.floor(i / 2);
                            const cellW = 600, cellH = 900;
                            const tX = col * cellW, tY = row * cellH;
                            ctx.save();
                            ctx.beginPath(); ctx.rect(tX, tY, cellW, cellH); ctx.clip();
                            const t = transforms[i];
                            const ratio = cellW / containerRefs[i].current.offsetWidth;
                            const dW = photo.width * t.scale * ratio, dH = photo.height * t.scale * ratio;
                            ctx.drawImage(img, (tX + cellW/2 + t.x * ratio) - dW/2, (tY + cellH/2 + t.y * ratio) - dH/2, dW, dH);
                            ctx.restore(); res();
                        };
                        img.src = photo.src;
                    });
                });

                Promise.all(draws).then(() => {
                    canvas.toBlob(b => {
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(b);
                        a.download = `collage_${Date.now()}.png`;
                        a.click();
                        setIsExporting(false);
                    }, 'image/png');
                });
            };

            return h('div', { className: 'h-screen flex flex-col overflow-hidden text-slate-400' },
                h('header', { className: 'px-4 py-4 border-b border-emerald-900/30 flex justify-between items-center bg-black/50' },
                    h('h1', { className: 'text-lg font-black italic text-[#10b981] uppercase emerald-glow' }, 'Collage 10x15'),
                    h('button', { 
                        onClick: exportCollage,
                        disabled: isExporting,
                        className: 'px-4 py-2 bg-[#10b981] text-black text-[10px] font-bold rounded-lg uppercase transition-all active:scale-95'
                    }, isExporting ? 'Procesando...' : 'Descargar PNG')
                ),
                h('main', { className: 'flex-1 flex flex-col items-center justify-center p-4 gap-6' },
                    h('div', { 
                        className: 'grid grid-cols-2 grid-rows-2 bg-black border border-emerald-900/20 emerald-shadow overflow-hidden',
                        style: { height: 'min(58vh, 450px)', aspectRatio: '2/3' }
                    },
                        photos.map((p, i) => h('div', {
                            key: i, ref: containerRefs[i],
                            onMouseDown: e => handleDrag(i, e),
                            onTouchStart: e => handleDrag(i, e),
                            className: `relative overflow-hidden bg-zinc-900 border-[0.5px] border-emerald-900/10 ${selectedIndex === i ? 'ring-2 ring-inset ring-[#10b981]' : 'opacity-60'}`
                        }, p ? h('img', {
                            src: p.src, className: 'absolute pointer-events-none max-w-none',
                            style: { 
                                transform: `translate(calc(-50% + ${transforms[i].x}px), calc(-50% + ${transforms[i].y}px)) scale(${transforms[i].scale})`,
                                top: '50%', left: '50%'
                            }
                        }) : h('div', { className: 'absolute inset-0 flex items-center justify-center opacity-10' }, 'Vacio')))
                    ),
                    h('div', { className: 'w-full max-w-sm bg-zinc-950 p-6 rounded-3xl border border-emerald-900/20 shadow-2xl' },
                        h('div', { className: 'flex justify-between items-center mb-4' },
                            h('span', { className: 'text-[10px] font-bold text-[#10b981] tracking-widest uppercase' }, `Slot ${selectedIndex + 1} Activo`),
                            h('div', { className: 'flex gap-4' },
                                h('button', { onClick: () => setPhotos(p => { const n=[...p]; n[selectedIndex]=null; return n; }), className: 'text-red-900 hover:text-red-500' }, 'Borrar'),
                                h('button', { onClick: () => { const n=[...transforms]; n[selectedIndex]={...n[selectedIndex], x:0, y:0, scale:n[selectedIndex].baseScale}; setTransforms(n); }, className: 'text-zinc-500' }, 'Reset')
                            )
                        ),
                        !photos[selectedIndex] ? 
                            h('button', { 
                                onClick: () => fileInputRef.current.click(),
                                className: 'w-full py-4 border border-dashed border-emerald-900/30 rounded-xl text-xs font-bold text-[#10b981]/50 hover:bg-emerald-950/10'
                            }, '+ Cargar Imagen') :
                            h('div', { className: 'flex items-center gap-4 bg-black/40 p-3 rounded-2xl border border-emerald-900/10' },
                                h('input', {
                                    type: 'range', min: transforms[selectedIndex].baseScale * 0.5, max: transforms[selectedIndex].baseScale * 4, step: '0.001',
                                    value: transforms[selectedIndex].scale,
                                    onChange: e => {
                                        const n = [...transforms]; n[selectedIndex].scale = parseFloat(e.target.value); setTransforms(n);
                                    },
                                    className: 'flex-1'
                                }),
                                h('span', { className: 'text-[10px] font-mono text-[#10b981] w-8' }, (transforms[selectedIndex].scale / transforms[selectedIndex].baseScale).toFixed(1) + 'x')
                            )
                    )
                ),
                h('input', { type: 'file', ref: fileInputRef, className: 'hidden', accept: 'image/*', onChange: handleFileChange })
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
</body>
</html>
