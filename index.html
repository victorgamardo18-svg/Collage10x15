<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage 10x15</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #10b981;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const CANVAS_WIDTH = 1200;
        const CANVAS_HEIGHT = 1800;

        const App = () => {
            const [photos, setPhotos] = useState([null, null, null, null]);
            const [transforms, setTransforms] = useState(
                Array(4).fill(0).map(() => ({ x: 0, y: 0, scale: 1, baseScale: 1 }))
            );
            const [selectedIndex, setSelectedIndex] = useState(0);
            const [isExporting, setIsExporting] = useState(false);

            const fileInputRef = useRef(null);
            const containerRefs = [useRef(), useRef(), useRef(), useRef()];

            const calculateInitialScale = (imgW, imgH, containerW, containerH) => {
                const scaleX = containerW / imgW;
                const scaleY = containerH / imgH;
                return Math.max(scaleX, scaleY);
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file && selectedIndex !== null) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const newPhotos = [...photos];
                            newPhotos[selectedIndex] = { src: event.target.result, width: img.width, height: img.height };
                            setPhotos(newPhotos);
                            
                            const containerW = containerRefs[selectedIndex].current.offsetWidth;
                            const containerH = containerRefs[selectedIndex].current.offsetHeight;
                            const initialScale = calculateInitialScale(img.width, img.height, containerW, containerH);
                            
                            setTransforms(prev => {
                                const next = [...prev];
                                next[selectedIndex] = { x: 0, y: 0, scale: initialScale, baseScale: initialScale };
                                return next;
                            });
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
                e.target.value = null;
            };

            const handleDrag = (index, e) => {
                setSelectedIndex(index);
                if (!photos[index]) return;
                
                const isTouch = e.type === 'touchstart';
                const startX = isTouch ? e.touches[0].clientX : e.clientX;
                const startY = isTouch ? e.touches[0].clientY : e.clientY;
                const initialPos = { x: transforms[index].x, y: transforms[index].y };

                const onMove = (moveEvent) => {
                    const currentX = isTouch ? moveEvent.touches[0].clientX : moveEvent.clientX;
                    const currentY = isTouch ? moveEvent.touches[0].clientY : moveEvent.clientY;
                    
                    setTransforms(prev => {
                        const next = [...prev];
                        next[index] = { ...next[index], x: initialPos.x + (currentX - startX), y: initialPos.y + (currentY - startY) };
                        return next;
                    });
                };

                const onEnd = () => {
                    window.removeEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
                    window.removeEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
                };

                window.addEventListener(isTouch ? 'touchmove' : 'mousemove', onMove);
                window.addEventListener(isTouch ? 'touchend' : 'mouseup', onEnd);
            };

            const exportCollage = async () => {
                if (isExporting) return;
                setIsExporting(true);

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = CANVAS_WIDTH;
                    canvas.height = CANVAS_HEIGHT;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    for (let i = 0; i < photos.length; i++) {
                        const photo = photos[i];
                        if (!photo) continue;

                        await new Promise((resolve) => {
                            const img = new Image();
                            img.onload = () => {
                                const col = i % 2; 
                                const row = Math.floor(i / 2);
                                const cellW = CANVAS_WIDTH / 2; 
                                const cellH = CANVAS_HEIGHT / 2;
                                const targetX = col * cellW; 
                                const targetY = row * cellH;
                                
                                ctx.save();
                                ctx.beginPath(); 
                                ctx.rect(targetX, targetY, cellW, cellH); 
                                ctx.clip();
                                
                                const t = transforms[i];
                                const uiToCanvasRatio = cellW / containerRefs[i].current.offsetWidth;
                                const drawW = photo.width * t.scale * uiToCanvasRatio;
                                const drawH = photo.height * t.scale * uiToCanvasRatio;
                                const centerX = targetX + cellW / 2 + (t.x * uiToCanvasRatio);
                                const centerY = targetY + cellH / 2 + (t.y * uiToCanvasRatio);
                                
                                ctx.drawImage(img, centerX - drawW / 2, centerY - drawH / 2, drawW, drawH);
                                ctx.restore();
                                resolve();
                            };
                            img.src = photo.src;
                        });
                    }

                    canvas.toBlob((blob) => {
                        const url = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `collage_10x15_victor_${Date.now()}.png`;
                        link.click();
                        URL.revokeObjectURL(url);
                        setIsExporting(false);
                    }, 'image/png');

                } catch (error) {
                    console.error(error);
                    setIsExporting(false);
                }
            };

            return (
                <div className="h-screen flex flex-col text-slate-300">
                    <header className="px-4 py-3 border-b border-[#10b981]/20 flex justify-between items-center bg-[#0a0a0a]">
                        <h1 className="text-base font-black tracking-tighter text-[#10b981] italic uppercase">Collage 10x15</h1>
                        <button
                            onClick={exportCollage}
                            disabled={isExporting || !photos.some(p => p)}
                            className="px-5 py-2 bg-[#10b981] hover:bg-[#34d399] disabled:bg-slate-800 text-black rounded-lg text-[11px] font-black uppercase transition-all flex items-center gap-2 shadow-[0_0_15px_rgba(16,185,129,0.3)]"
                        >
                            <i data-lucide="download" className="w-4 h-4"></i>
                            {isExporting ? "Generando..." : "Descargar PNG"}
                        </button>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center p-3 gap-5 overflow-hidden">
                        <div 
                            className="relative bg-black shadow-2xl overflow-hidden border border-slate-900"
                            style={{ 
                                height: 'min(60vh, 480px)', 
                                aspectRatio: '2/3',
                                display: 'grid',
                                gridTemplateColumns: '1fr 1fr',
                                gridTemplateRows: '1fr 1fr'
                            }}
                        >
                            {photos.map((photo, i) => (
                                <div 
                                    key={i}
                                    ref={containerRefs[i]}
                                    onMouseDown={(e) => handleDrag(i, e)}
                                    onTouchStart={(e) => handleDrag(i, e)}
                                    className={`relative overflow-hidden cursor-move transition-all duration-300 ${
                                        selectedIndex === i ? 'ring-2 ring-inset ring-[#10b981] z-10' : 'opacity-60'
                                    } bg-[#0d0d0d]`}
                                >
                                    {!photo ? (
                                        <div className="absolute inset-0 flex items-center justify-center opacity-20 text-[#10b981]">
                                            <i data-lucide="image" className="w-6 h-6"></i>
                                        </div>
                                    ) : (
                                        <img 
                                            src={photo.src} 
                                            className="absolute pointer-events-none max-w-none origin-center"
                                            style={{
                                                transform: `translate(calc(-50% + ${transforms[i].x}px), calc(-50% + ${transforms[i].y}px)) scale(${transforms[i].scale})`,
                                                top: '50%', left: '50%'
                                            }}
                                        />
                                    )}
                                </div>
                            ))}
                        </div>

                        <div className="w-full max-w-sm bg-[#0a0a0a] rounded-2xl border border-[#10b981]/10 p-5">
                            <div className="flex items-center justify-between mb-4">
                                <div className="flex items-center gap-2">
                                    <div className="w-2 h-2 rounded-full bg-[#10b981] animate-pulse" />
                                    <span className="text-[11px] font-black text-[#10b981] uppercase tracking-widest">Ajuste Slot {selectedIndex + 1}</span>
                                </div>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => { const n = [...transforms]; n[selectedIndex] = { ...n[selectedIndex], x:0, y:0, scale: n[selectedIndex].baseScale }; setTransforms(n); }}
                                        className="p-1 hover:text-[#10b981]"
                                    >
                                        <i data-lucide="refresh-cw" className="w-4 h-4"></i>
                                    </button>
                                    <button 
                                        onClick={() => setPhotos(p => { const n=[...p]; n[selectedIndex]=null; return n; })}
                                        className="p-1 hover:text-red-500"
                                    >
                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                {!photos[selectedIndex] ? (
                                    <button 
                                        onClick={() => fileInputRef.current.click()}
                                        className="flex-1 py-4 bg-[#10b981]/5 border-2 border-dashed border-[#10b981]/20 rounded-xl flex items-center justify-center gap-3 text-xs font-bold text-[#10b981] hover:bg-[#10b981]/10 transition-all"
                                    >
                                        <i data-lucide="upload" className="w-4 h-4"></i> Cargar Imagen
                                    </button>
                                ) : (
                                    <div className="flex-1 flex items-center gap-4 bg-[#10b981]/5 p-3 rounded-xl border border-[#10b981]/10">
                                        <i data-lucide="zoom-in" className="w-4 h-4 text-[#10b981]/60"></i>
                                        <input 
                                            type="range" 
                                            min={transforms[selectedIndex].baseScale * 0.5} 
                                            max={transforms[selectedIndex].baseScale * 4} 
                                            step="0.001"
                                            value={transforms[selectedIndex].scale}
                                            onChange={(e) => {
                                                const next = [...transforms];
                                                next[selectedIndex].scale = parseFloat(e.target.value);
                                                setTransforms(next);
                                            }}
                                            className="flex-1 h-1.5 bg-[#10b981]/10 rounded-lg appearance-none cursor-pointer accent-[#10b981]"
                                        />
                                        <span className="text-[11px] font-mono font-bold text-[#10b981] w-10 text-right">
                                            {(transforms[selectedIndex].scale / transforms[selectedIndex].baseScale).toFixed(1)}x
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>

                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handleFileChange} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializar iconos de Lucide después del renderizado
        setTimeout(() => lucide.createIcons(), 500);
        // Observador para nuevos iconos cuando cambie el estado
        const observer = new MutationObserver(() => lucide.createIcons());
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
</body>
</html>
